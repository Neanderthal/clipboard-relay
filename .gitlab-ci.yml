stages:
  - deploy
  - cleanup

pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp pages/index.html public/index.html
    # Generate clips manifest for the web UI
    - |
      echo "[" > public/clips.json
      first=true
      for f in clips/*.gpg 2>/dev/null; do
        [ -f "$f" ] || continue
        name=$(basename "$f")
        if [ "$first" = true ]; then first=false; else echo "," >> public/clips.json; fi
        echo "{\"name\": \"$name\"}" >> public/clips.json
      done
      echo "]" >> public/clips.json
  artifacts:
    paths:
      - public
  only:
    - main

cleanup_expired_clips:
  stage: cleanup
  image: alpine/git:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - git config user.email "ci@clipboard-relay"
    - git config user.name "Clipboard Relay CI"
    - git checkout main
    - |
      now=$(date +%s)
      deleted=0
      for f in clips/*.gpg; do
        [ -f "$f" ] || continue
        name=$(basename "$f" .gpg)
        # Parse YYYYMMDD_HHMMSS
        file_ts=$(date -d "$(echo $name | sed 's/\([0-9]\{4\}\)\([0-9]\{2\}\)\([0-9]\{2\}\)_\([0-9]\{2\}\)\([0-9]\{2\}\)\([0-9]\{2\}\)/\1-\2-\3 \4:\5:\6/')" +%s 2>/dev/null || echo 0)
        age_hours=$(( (now - file_ts) / 3600 ))
        if [ "$age_hours" -gt 24 ]; then
          rm "$f"
          git add "$f"
          echo "Deleted: $(basename $f)"
          deleted=$((deleted + 1))
        fi
      done
      if [ "$deleted" -gt 0 ]; then
        git commit -m "Expire $deleted clip(s)"
        git push origin main
      else
        echo "Nothing to clean up."
      fi
